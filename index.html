<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Boston Theater</title>
    <!-- Chargement des polices, des icônes et lien avec le code CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    //Link fichier JS
    <script src="script.js"></script>
</head>
<body>

    <!-- Partie "bannière" de la page principale" -->
    <header>
        <!-- Première ligne de la bannière -->
        <div class="header-top">
            <div class="logo">Boston Theater</div>
            <div class="search-box"><i class="fa fa-search"></i> Rechercher</div>
        </div>
        <!-- Deuxième ligne de la bannière -->
        <div class="nav-secondary">
            <span>Tickets & Events | Your Visit | About Us | Cart <i class="fa fa-shopping-basket"></i></span>
        </div>
    </header>

    <!-- J'ai enlevé toutes les infos du main car elles seront toutes dans le JS-->
    <main class="shows-grid" id="main-grid">
    </main>

    <!-- Ce qui se passe quand on clique sur More Info -->
    <!-- Fond un peu noir/transparent qui se met sur en arrière plan sur la page principale -->
    <div id="modal-info" class="modal-overlay">
        <!-- Carte pop up -->
        <div class="modal-content">
            <!-- Croix en haut à droite pour fermer la carte -->
            <span class="close-btn" onclick="closeModal('modal-info')">&times;</span>
            <!-- À gauche de la carte, on met la photo de la pièce de théatre de la carte sur laquelle on a cliqué -->
            <div class="info-card-left"><img id="info-img" src=""></div>
            <!-- À droite de la carte on mets toutes les infos qu'il y avait dans le pdf shows.pdf : titre, catégorie, lieu, date, prix et j'ai rajouté le bouton buy tickets sur cette carte -->
            <div class="info-card-right">
                <h4 id="info-title"></h4>
                <div class="detail-item"><span id="info-cat"></span></div>
                <div class="detail-item" id="info-desc"></div>
                <div class="detail-item"><strong id="info-venue"></strong></div>
                <div class="detail-item" id="info-dates"></div>
                <div class="detail-item" id="info-price" style="color:white; font-weight:bold;"></div>
                <button class="btn-buy" id="btn-buy-from-info" style="width:100%; margin-top:10px;">Buy Tickets</button>
            </div>
        </div>
    </div>

    <!-- Ce qui se passe quand on clique sur Buy tickets -->
    <!-- Fond un peu noir/transparent qui se met sur en arrière plan sur la page principale -->
    <div id="modal-buy" class="modal-overlay">
        <!-- Carte pop up -->
        <div class="modal-content">
            <!-- Croix en haut à droite pour fermer la carte -->
            <span class="close-btn" onclick="closeModal('modal-buy')">&times;</span>
            <!-- À gauche de la carte, on met la photo de la pièce de théatre de la carte sur laquelle on a cliqué et un faux bouton "Confirmer" -->
            <div class="info-card-left">
                <img id="buy-img" src="">
                <button class="btn-buy" style="width:100%; margin-top:10px">Confirmer</button>
            </div>
            <div class="cal-box">
                <!-- À droite de la carte, un faux calendrier sur lequel on peut cliquer les dates et ca change de couleur-->
                <strong>Sélectionnez une date</strong>
                <div class="days-grid" id="calendar-days"></div>
            </div>
        </div>
    </div>

<!-- J'ai enlevé la partie script car elle est désormais dans le JS-->
</body>
</html>
