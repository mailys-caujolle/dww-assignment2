<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Boston Theater</title>
    <!-- Chargement des polices, des icônes et lien avec le code CSS -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    //Link fichier JS
    <script src="script.js"></script>
</head>
<body>

    <!-- Partie "bannière" de la page principale" -->
    <header>
        <!-- Première ligne de la bannière -->
        <div class="header-top">
            <div class="logo">Boston Theater</div>
            <div class="search-box"><i class="fa fa-search"></i> Rechercher</div>
        </div>
        <!-- Deuxième ligne de la bannière -->
        <div class="nav-secondary">
            <span>Tickets & Events | Your Visit | About Us | Cart <i class="fa fa-shopping-basket"></i></span>
        </div>
    </header>

    <!-- J'ai enlevé toutes les infos du main car elles seront toutes dans le JS-->
    <main class="shows-grid" id="main-grid">
    </main>

    <!-- Ce qui se passe quand on clique sur More Info -->
    <!-- Fond un peu noir/transparent qui se met sur en arrière plan sur la page principale -->
    <div id="modal-info" class="modal-overlay">
        <!-- Carte pop up -->
        <div class="modal-content">
            <!-- Croix en haut à droite pour fermer la carte -->
            <span class="close-btn" onclick="closeModal('modal-info')">&times;</span>
            <!-- À gauche de la carte, on met la photo de la pièce de théatre de la carte sur laquelle on a cliqué -->
            <div class="info-card-left"><img id="info-img" src=""></div>
            <!-- À droite de la carte on mets toutes les infos qu'il y avait dans le pdf shows.pdf : titre, catégorie, lieu, date, prix et j'ai rajouté le bouton buy tickets sur cette carte -->
            <div class="info-card-right">
                <h4 id="info-title"></h4>
                <div class="detail-item"><span id="info-cat"></span></div>
                <div class="detail-item" id="info-desc"></div>
                <div class="detail-item"><strong id="info-venue"></strong></div>
                <div class="detail-item" id="info-dates"></div>
                <div class="detail-item" id="info-price" style="color:white; font-weight:bold;"></div>
                <button class="btn-buy" id="btn-buy-from-info" style="width:100%; margin-top:10px;">Buy Tickets</button>
            </div>
        </div>
    </div>

    <!-- Ce qui se passe quand on clique sur Buy tickets -->
    <!-- Fond un peu noir/transparent qui se met sur en arrière plan sur la page principale -->
    <div id="modal-buy" class="modal-overlay">
        <!-- Carte pop up -->
        <div class="modal-content">
            <!-- Croix en haut à droite pour fermer la carte -->
            <span class="close-btn" onclick="closeModal('modal-buy')">&times;</span>
            <!-- À gauche de la carte, on met la photo de la pièce de théatre de la carte sur laquelle on a cliqué et un faux bouton "Confirmer" -->
            <div class="info-card-left">
                <img id="buy-img" src="">
                <button class="btn-buy" style="width:100%; margin-top:10px">Confirmer</button>
            </div>
            <div class="cal-box">
                <!-- À droite de la carte, un faux calendrier sur lequel on peut cliquer les dates et ca change de couleur-->
                <strong>Sélectionnez une date</strong>
                <div class="days-grid" id="calendar-days"></div>
            </div>
        </div>
    </div>

     <!-- "Base de données" pour les éléments que j'utilise plusieurs fois dans mon code pour pas à avoir à les réécrire et els retrouver facilement -->
    <script>

        // J'ai enlevé la base de données car elle est désormais dans shows.json
        
        //Fonction faite avec l'IA pour que les bonnes infos apparaissent quand on clique sur More Info
        /* Prompt utilisé : "Avec le code déjà existant, je veux une fonction qui fasse apparaitre une carte pop up qui se ferme avec une 
        croix en haut à droite, et qui affiche à droite les infos qu'il y a dans ma base de données organisées dans l'ordre; à gauche
        l'image de la photo liée au bouton sur lequel on a cliqué et qu'il y ait un bouton buy tickets qui fasse apparaitre la carte pop up
        buy tickets au dessus de cette carte sans la fermer"

        Cela m'a donné cette fonction et m'a rajouté une ligne dans l'affichage des cartes plus haut pour inclure la fonction

        J'ai fait de même pour la fonction openBuyTickets*/
        
        function openMoreInfo(id) {
            const s = shows[id];
            document.getElementById('info-title').innerText = s.title;
            document.getElementById('info-cat').innerText = s.cat;
            document.getElementById('info-desc').innerText = s.desc;
            document.getElementById('info-venue').innerText = s.venue;
            document.getElementById('info-dates').innerText = s.dates;
            document.getElementById('info-price').innerText = s.price;
            document.getElementById('info-img').src = s.img;
            document.getElementById('modal-info').style.display = 'flex';
            document.getElementById('btn-buy-from-info').onclick = () => openBuyTickets(id);
        }

        //Fonction tirée de la fonction précédente pour que les bonnes infos apparaissent quand on clique sur Buy tickets
        /*Prompt utilisé : "Avec le code déjà existant, je veux une fonction qui fasse apparaitre une carte pop up qui se ferme avec une 
        croix en haut à droite, et qui affiche à droite un calendrier sur lequel on peut cliquer les dates; à gauche
        l'image de la photo liée au bouton sur lequel on a cliqué"

        Cela m'a crée une fonction supplémentaire renderCalendar, qui a été insérée dans la fonction openBuyTickets
        */
        
        function openBuyTickets(id) {
            document.getElementById('buy-img').src = shows[id].img;
            //Appelle mon autre fonction calendrier
            renderCalendar();
            document.getElementById('modal-buy').style.display = 'flex';
        }

        //Fonction qui permet de fermer les fenêtres pop up
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        //Fonction faite avec l'IA pour afficher un calendrier interactif
        function renderCalendar() {
            const grid = document.getElementById('calendar-days');
            //Jours de la semaine
            grid.innerHTML = "<span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span>";
            //boucle for pour créer les jours du mois
            for (let i = 1; i <= 31; i++) {
                let d = document.createElement('span'); d.className = 'day'; d.innerText = i;
                d.onclick = function() { document.querySelectorAll('.day').forEach(el => el.classList.remove('active')); this.classList.add('active'); };
                grid.appendChild(d);
            }
        }
    </script>
</body>
</html>
